# Codemagic CI/CD configuration for BikiBook
workflows:
  android-release:
    name: BikiBook Android Release
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Build Android APK
        script: |
          flutter pub get
          flutter build apk --release --tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - sagardeepmix@gmail.com

  ios-release:
    name: BikiBook iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build iOS App (No Signing)
        script: |
          # এটি শুধু কোড চেক করবে, ফাইনাল IPA-র জন্য সার্টিফিকেট লাগবে
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
    publishing:
      email:
        recipients:
          - sagardeepmix@gmail.com

